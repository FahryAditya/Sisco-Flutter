name: sisko
description: "Skarlakes - Sistem Absensi Organisasi"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  go_router: ^14.2.7
  provider: ^6.1.2

  firebase_core: ^3.0.0
  cloud_firestore: ^5.0.0
  firebase_auth: ^5.0.0
  firebase_app_check: ^0.3.0

  google_fonts: ^6.1.0
  lottie: ^3.1.2
  shimmer: ^3.0.0
  flutter_animate: ^4.5.0

  intl: ^0.19.0
  fl_chart: ^0.68.0

  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.11

  path_provider: ^2.1.0

  # Offline-first: penyimpanan sementara SQLite + deteksi jaringan untuk auto-sync
  sqflite: ^2.3.3
  connectivity_plus: ^6.1.0

  image_picker: ^1.0.7
  cached_network_image: ^3.3.0
  firebase_storage: ^12.0.0

  modal_bottom_sheet: ^3.0.0
  table_calendar: ^3.1.0

  uuid: ^4.3.3
  collection: ^1.18.0
  file_picker: ^8.1.0
  excel: ^4.0.0
  share_plus: ^10.0.0
  flutter_dotenv: ^5.2.1
  http: ^1.2.2

  # Cetak QR (dialog print sistem) + simpan QR ke galeri HP
  printing: ^5.13.0
  pdf: ^3.11.0
  gal: ^2.3.1

  # Notifikasi lokal (in-app foreground/background running) — kirim gelembung
  # notifikasi saat pesan chat baru masuk, mirip WhatsApp saat HP aktif.
  flutter_local_notifications: ^17.2.3

  # Preferensi lokal (mis. "Jangan tampilkan lagi" untuk popup) dan launcher
  # URL eksternal (buka akun Instagram di app/browser).
  shared_preferences: ^2.3.2
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/logo.png"
  adaptive_icon_background: "#000B18"
  adaptive_icon_foreground: "assets/images/logo.png"

flutter:
  uses-material-design: true

  assets:
    - assets/images/logo.png
    - assets/images/mencaridata.jpeg
    - assets/images/sinkronasi.jpeg
    - assets/images/berhasil.jpeg
    - assets/images/eror.jpeg
    - .env
